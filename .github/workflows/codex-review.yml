name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    name: codex-review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Skip until OpenAI secret is configured
        if: env.OPENAI_API_KEY == ''
        run: |
          echo "Codex PR review skipped because OPENAI_API_KEY is not configured." >> "$GITHUB_STEP_SUMMARY"
          echo "Add the repository secret to enable automated Codex PR reviews."

      - uses: actions/checkout@v7
        if: env.OPENAI_API_KEY != ''
        with:
          fetch-depth: 0

      - name: Verify OpenAI secret
        if: env.OPENAI_API_KEY != ''
        run: test -n "$OPENAI_API_KEY" || (echo "Missing OPENAI_API_KEY secret for Codex PR review" && exit 1)

      - name: Run Codex review
        if: env.OPENAI_API_KEY != ''
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/review-prompt.md
          output-file: codex-review.md
          sandbox: read-only

      - name: Comment Codex review
        if: env.OPENAI_API_KEY != ''
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const review = fs.existsSync("codex-review.md")
              ? fs.readFileSync("codex-review.md", "utf8").trim()
              : `${{ steps.codex.outputs.final-message }}`.trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Codex review\n\n${review || "Codex completed without review output."}`
            });
