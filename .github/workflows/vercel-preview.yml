name: Vercel Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: deploy-preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SMOKE_REQUIRE_READY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing VERCEL_TOKEN secret" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID secret" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID secret" && exit 1)

      - name: Install Vercel CLI
        run: npm install -g vercel@54.11.1

      - name: Pull preview environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build preview artifact
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview artifact
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "$url"

      - name: Smoke test preview
        run: SMOKE_BASE_URL="${{ steps.deploy.outputs.url }}" npm run test:smoke

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.url }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel preview is ready: ${url}`
            });
